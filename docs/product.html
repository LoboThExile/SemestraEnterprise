<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<nav>
<div class="container">
<img src="https://placehold.co/80x40" alt="Semestra Enterprise Logo" class="logo">
<span class="menu-toggle">&#9776;</span>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
</nav>

<section class="hero">
  <div class="container">
    <h1 id="title">Loading...</h1>
    <p id="description"></p>
    <img id="heroImage" src="" alt="Product image" class="hero-image"/>
    <p class="price" id="price"></p>

    <a href="contact.html" class="btn">Contact to Order</a>
  </div>
</section>
<div class="divider"></div>
<section>
  <div class="container">
    <h2>Product Details</h2>

    <div class="product-detail">
      <img id="detailImage" src="" alt="" class="product-image"/>

      <div class="product-info">
        <h3 id="name"></h3>
        <p id="longDescription"></p>

        <h4>Features</h4>
        <ul id="features"></ul>
      </div>
    </div>
  </div>
</section>

  </div>
